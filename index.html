<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>HARO · Chatbot (WhatsApp claro)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#128C7E" />
  <style>
    :root{
      --wa-green:#128C7E; --wa-green-dark:#075E54; --wa-accent:#25D366;
      --bg:#E5DDD5; --pane:#F0F0F0; --chat:#EFEAE2; --bot:#FFFFFF; --user:#D9FDD3;
      --text:#111B21; --muted:#667781; --border:#D1D7DB;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,Helvetica,sans-serif;
      color:var(--text);
      background:radial-gradient(1200px 600px at 10% -10%, rgba(18,140,126,.06), transparent 40%), var(--bg);
      padding:16px;
    }
    .app{
      display:flex;flex-direction:column;height:calc(100vh - 32px);max-width:520px;margin:0 auto;
      background:var(--chat);border-radius:18px;overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.03);
    }
    header{display:flex;align-items:center;gap:12px;padding:12px 14px;background:linear-gradient(0deg,var(--wa-green),var(--wa-green-dark));color:#fff}
    .avatar{width:38px;height:38px;border-radius:50%}
    .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:2px solid rgba(255,255,255,.65);background:#fff}
    .title{display:flex;flex-direction:column}
    .title b{font-size:15px;line-height:1}
    .title small{color:#E9F5F2;opacity:.95}

    .chat{flex:1;overflow:auto;padding:12px 10px 0}
    .msg{display:flex;margin:8px 0}
    .msg .bubble{
      max-width:82%;padding:9px 11px;border-radius:10px;line-height:1.42;
      border:1px solid rgba(0,0,0,.04);box-shadow:0 1px 0 rgba(0,0,0,.04)
    }
    .msg.bot{justify-content:flex-start}
    .msg.bot .bubble{background:var(--bot)}
    .msg.user{justify-content:flex-end}
    .msg.user .bubble{background:var(--user)}

    .quick{display:flex;flex-wrap:wrap;gap:8px;padding:8px 10px 10px}
    .chip{
      background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 12px;
      font-size:14px;cursor:pointer;box-shadow:0 1px 0 rgba(0,0,0,.04)
    }

    .composer{display:flex;gap:8px;padding:10px;background:var(--pane);border-top:1px solid var(--border)}
    .composer input{flex:1;padding:12px 14px;border-radius:22px;border:1px solid var(--border);background:#fff}
    .composer button{padding:10px 14px;border:none;border-radius:22px;background:var(--wa-accent);color:#fff;font-weight:700;cursor:pointer}
    pre{white-space:pre-wrap;margin:0;font:inherit}
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="Chat HARO">
    <header>
      <div class="avatar"><img src="media/logoHARO.png" alt="HARO"></div>
      <div class="title"><b>Academia HARO</b><small>Asistente virtual</small></div>
    </header>

    <main id="chat" class="chat" aria-live="polite"></main>
    <div id="quickReplies" class="quick"></div>
    <div class="composer">
      <input id="userInput" type="text" placeholder="Escribe un mensaje…" autocomplete="off" />
      <button id="sendBtn">Enviar</button>
    </div>
  </div>

  <!-- Módulo principal -->
  <script type="module" src="./js/bot.js"></script>
</body>
</html>
