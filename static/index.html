<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Chatbot HARO – Simulador WhatsApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #ecfdf5; }
    .smooth { scroll-behavior: smooth; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

/* === Utilidades === */
const nowTime = () => new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
const normalize = (t="") => t.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, " ");
const EMAIL_RE = /^[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}$/;
const DATE_RE  = /^\d{4}-\d{2}-\d{2}$/;     // AAAA-MM-DD
const TIME_RE  = /^([01]\d|2[0-3]):[0-5]\d$/; // HH:MM 24h
const PLACA_RE = /^[A-Z]{3}\d{3}$/;         // ABC123

/* === Burbujas === */
const BotBubble = ({ text, hint }) => (
  <div className="flex items-end gap-2 w-full">
    <img src="/static/logoHARO.png" alt="HARO" className="shrink-0 w-8 h-8 rounded-full object-cover border border-emerald-200" />
    <div className="max-w-[75%] rounded-2xl rounded-bl-sm bg-white shadow p-3 text-[15px] leading-relaxed whitespace-pre-wrap">
      {text}
      {hint ? <div className="text-[12px] mt-2 p-2 bg-emerald-50 border border-emerald-100 rounded">💡 {hint}</div> : null}
      <div className="text-[11px] text-gray-500 mt-1">{nowTime()}</div>
    </div>
  </div>
);

const UserBubble = ({ text }) => (
  <div className="flex items-end gap-2 w-full justify-end">
    <div className="max-w-[75%] rounded-2xl rounded-br-sm bg-emerald-600 text-white shadow p-3 text-[15px] leading-relaxed whitespace-pre-wrap">
      {text}
      <div className="text-[11px] opacity-80 mt-1 text-right">{nowTime()}</div>
    </div>
  </div>
);

/* === Mensajes informativos === */
const EXTRA = {
  horariosPracticaMoto: `🏍️ PRÁCTICA MOTO
• Lunes a Viernes: 6:00 AM – 6:00 PM
• Sábados, domingos y festivos: 6:00 AM – 2:00 PM`,
  horariosPracticaVehiculo: `🚗 PRÁCTICA VEHÍCULO
• Lunes a Viernes: 6:00 AM – 10:00 PM
• Sábados, domingos y festivos: 6:00 AM – 2:00 PM`,
  horariosTeoriaTaller: `👩‍🏫 TEORÍA Y TALLER
• Lunes a Viernes: 6 AM – 12 PM / 4 PM – 10 PM
• Sábados: 8 AM – 6 PM
• Domingos/Festivos: 8 AM – 2 PM`,
  companyInfo: `🏢 *Academia de Conducción HARO*
📍 Bogotá D.C., Colombia
📬 Dirección (registros públicos): Av. 1° de Mayo #68D-23, Piso 2
📱 Redes: Instagram @haroacademia · Facebook Haro Academia | Bogotá
🎓 Cursos A2, B1, C1 (enfoque en seguridad vial)
`
};

/* === Motor conversacional LOCAL (respaldo si el backend falla) === */
function createEngine() {
  const mensajes = {
    inicio:
`👋 ¡Hola! Soy el chatbot de la *Academia de Conducción HARO*.
Puedo ayudarte con:
• Información de cursos y matrículas
• Agendamiento de clases
• Consultas sobre horarios y empresa

Usa el menú de abajo o escribe: 1 (Nuevo) · 2 (Activo) · autenticar`,
    menu_nuevo:
`🧾 NUEVO ESTUDIANTE
1️⃣ Ver cursos disponibles
2️⃣ Iniciar matrícula
3️⃣ Volver al inicio`,
    menu_activo:
`🎓 ESTUDIANTE ACTIVO
a) Agendar práctica
b) Programar examen
c) Solicitar certificación
🔐 Escribe *autenticar* para ver tu información
d) Volver al inicio`,
    menu_info_activo:
`ℹ️ INFORMACIÓN PARA ESTUDIANTES
1️⃣ Horarios de prácticas
2️⃣ Horarios de teoría/taller
3️⃣ Info de la empresa
4️⃣ Volver a estudiante`
  };

  const syn = {
    inicio: { "1":"menu_nuevo", "2":"menu_activo", "autenticar":"login_estudiante" },
    menu_nuevo: { "1":"menu_cursos","2":"inicio_matricula","3":"inicio" },
    menu_activo: { "a":"agendar_practica","b":"programar_examen","c":"solicitar_certificacion","d":"inicio","autenticar":"login_estudiante" },
    menu_info_activo: { "1":"info_practicas","2":"info_teoria","3":"info_empresa","4":"menu_activo" }
  };

  let session = { estado:"inicio" };

  function procesar(entradaRaw){
    const t = normalize(entradaRaw);

    const trans = syn[session.estado] || {};
    if (trans[t]) {
      const prox = trans[t];
      session.estado = prox;
      switch(prox){
        case "menu_nuevo":           return mensajes.menu_nuevo;
        case "menu_activo":          return mensajes.menu_activo;
        case "login_estudiante":     return "🔐 Autenticación por *correo + OTP*. Escribe *correo* para enviar tu email y luego *otp 123456*.";
        case "menu_cursos":          return "📚 Cursos disponibles: A2, B1, C1.";
        case "inicio_matricula":     return "📝 Envíame tu *nombre completo* y *documento (solo números)*.";
        case "agendar_practica":     return "🗓️ Agendar (formato): *placa ABC123 fecha 2025-11-02 hora 09:00*";
        case "programar_examen":     return "🧪 Programa tu examen. Escribe *fecha 2025-11-03* o *simulador*.";
        case "solicitar_certificacion": return "📄 Tu solicitud fue registrada. Te contactaremos.";
        case "info_practicas":       return EXTRA.horariosPracticaMoto + "\n\n" + EXTRA.horariosPracticaVehiculo;
        case "info_teoria":          return EXTRA.horariosTeoriaTaller;
        case "info_empresa":         return EXTRA.companyInfo;
        case "inicio":               return mensajes.inicio;
        default:                     return "OK";
      }
    }

    // comandos rápidos
    if (t === "correo") return "📧 Escribe tu *correo* (ej.: usuario@dominio.com). Luego envía *otp 123456* (demo).";
    if (t.startsWith("otp ")) return "✅ OTP verificado (demo). Escribe *a* para agendar práctica.";
    if (t === "horarios") return EXTRA.horariosPracticaMoto + "\n\n" + EXTRA.horariosPracticaVehiculo;
    if (t.includes("empresa") || t === "haro") return EXTRA.companyInfo;
    if (t === "volver" || t === "menu") { session.estado="inicio"; return mensajes.inicio; }

    return "No entendí. Usa el menú o escribe: 1 (Nuevo) · 2 (Activo) · autenticar · correo · otp 123456 · volver";
  }

  return { procesar, get estado(){return session.estado;}, mensajeInicio:mensajes.inicio };
}

/* === Panel DB (opcional, maqueta) === */
const DB_KEY = "matriculas_v1";
const db_load = () => { try { return JSON.parse(localStorage.getItem(DB_KEY) || "[]"); } catch { return []; } };
function BaseMatriculasPanel({open,onClose}){
  const [rows,setRows]=useState([]);
  useEffect(()=>{ if(open) setRows(db_load()); },[open]);
  if(!open) return null;
  return(
  <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-3 z-50">
    <div className="bg-white w-full max-w-3xl rounded-2xl shadow-xl">
      <div className="bg-emerald-700 text-white px-4 py-3 flex justify-between">
        <b>📄 Base de Matrículas</b>
        <button onClick={onClose} className="px-3 py-1 rounded-md bg-white/20 hover:bg-white/30">Cerrar</button>
      </div>
      <div className="p-3">
        {rows.length===0? <p className="text-gray-500">Sin registros aún.</p>:
          <table className="min-w-full text-sm">
            <thead className="bg-emerald-50"><tr><th className="p-2 text-left">Nombre</th><th className="p-2 text-left">Correo</th><th className="p-2">Curso</th></tr></thead>
            <tbody>{rows.map((r,i)=><tr key={i} className="border-t"><td className="p-2">{r.nombre}</td><td className="p-2">{r.correo}</td><td className="p-2">{r.curso}</td></tr>)}</tbody>
          </table>}
      </div>
    </div>
  </div>);
}

/* === Teclado rápido === */
function QuickActions({ items, onPick, title="Opciones" }){
  return (
    <div className="px-3 py-2 bg-white border-t border-emerald-200">
      <div className="text-xs text-emerald-700 mb-1">{title}</div>
      <div className="grid grid-cols-2 gap-2">
        {items.map((it, idx)=>(
          <button key={idx}
            onClick={()=>onPick(it.value)}
            className="text-sm px-3 py-2 rounded-xl border border-emerald-200 bg-white hover:bg-emerald-50 text-emerald-900 text-left shadow-sm">
            {it.label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* === Asistentes de formato (Correo/OTP y Agendar) === */
function FormatAssist({onSend}) {
  // Correo + OTP
  const [email,setEmail]=useState("");
  const [otp,setOtp]=useState("");
  const sendEmail=()=>{
    if(!EMAIL_RE.test(email)) return alert("Correo inválido. Ej: usuario@dominio.com");
    onSend("correo"); setTimeout(()=>onSend(email),90);
  };
  const sendOtp=()=>{
    const t = otp.trim();
    if(!/^\d{4,8}$/.test(t)) return alert("OTP inválido. Solo dígitos (6 recomendado).");
    onSend(`otp ${t}`);
  };

  // Agendar práctica
  const [placa,setPlaca]=useState("");
  const [fecha,setFecha]=useState("");
  const [hora,setHora]=useState("");
  const sendAgenda=()=>{
    const p = placa.trim().toUpperCase();
    if(!PLACA_RE.test(p)) return alert("Placa inválida. Formato ABC123.");
    if(!DATE_RE.test(fecha)) return alert("Fecha inválida. Formato AAAA-MM-DD.");
    if(!TIME_RE.test(hora)) return alert("Hora inválida. Formato 24h HH:MM.");
    onSend(`placa ${p} fecha ${fecha} hora ${hora}`);
  };

  return (
    <div className="bg-white border-t px-3 py-3 space-y-3">
      <div className="text-sm font-semibold text-gray-700">Asistentes de formato</div>

      <div className="rounded-xl border p-3">
        <div className="text-[13px] font-medium mb-2">🔐 Autenticación (Correo + OTP)</div>
        <div className="flex gap-2 flex-wrap">
          <input className="border rounded px-2 py-1 text-sm" placeholder="correo@dominio.com" value={email} onChange={e=>setEmail(e.target.value)} />
          <button className="rounded px-3 py-1 text-sm bg-emerald-600 text-white" onClick={sendEmail}>Enviar correo</button>
        </div>
        <div className="flex gap-2 flex-wrap mt-2">
          <input className="border rounded px-2 py-1 text-sm w-28" placeholder="OTP (123456)" value={otp} onChange={e=>setOtp(e.target.value)} />
          <button className="rounded px-3 py-1 text-sm border" onClick={sendOtp}>Enviar OTP</button>
        </div>
        <div className="text-[12px] text-gray-500 mt-1">Formato esperado: <span className="mono">otp 123456</span></div>
      </div>

      <div className="rounded-xl border p-3">
        <div className="text-[13px] font-medium mb-2">🗓️ Agendar práctica</div>
        <div className="flex gap-2 flex-wrap">
          <input className="border rounded px-2 py-1 text-sm w-24 uppercase" placeholder="ABC123" maxLength="6" value={placa} onChange={e=>setPlaca(e.target.value)} />
          <input className="border rounded px-2 py-1 text-sm w-36" placeholder="2025-11-02" value={fecha} onChange={e=>setFecha(e.target.value)} />
          <input className="border rounded px-2 py-1 text-sm w-24" placeholder="09:00" value={hora} onChange={e=>setHora(e.target.value)} />
          <button className="rounded px-3 py-1 text-sm bg-emerald-600 text-white" onClick={sendAgenda}>Enviar</button>
        </div>
        <div className="text-[12px] text-gray-500 mt-1">Formato esperado: <span className="mono">placa ABC123 fecha 2025-11-02 hora 09:00</span></div>
      </div>
    </div>
  );
}

/* === App === */
function App(){
  const engine=useMemo(()=>createEngine(),[]);
  const [messages,setMessages]=useState([{from:"bot",text:engine.mensajeInicio}]);
  const [input,setInput]=useState(""); 
  const [showDB,setShowDB]=useState(false);
  const [started,setStarted]=useState(false);
  const scroller=useRef(null);
  useEffect(()=>{scroller.current?.scrollTo({top:scroller.current.scrollHeight,behavior:"smooth"});},[messages]);

  const sendText = async(textToSend)=>{
    if(!textToSend || !textToSend.trim()) return;
    const text = textToSend.trim();
    const userMsg = {from:"me", text};
    setMessages(m=>[...m, userMsg]);
    setStarted(true);

    try{
      const res = await fetch(`/webhook/incoming`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          conversation_id: "web-"+Date.now(),
          from: "web-demo-usuario",
          type: "text",
          text,
          message_id: "webmsg-"+(crypto.randomUUID?.() || Math.random().toString(36).slice(2))
        })
      });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok) {
        const msg = (data && data.error) ? data.error : "Error del servidor";
        setMessages(m=>[...m, {from:"bot", text:`⚠️ ${msg}`}]);
        return;
      }
      const botMsgs = (data?.messages && Array.isArray(data.messages))
        ? data.messages
        : data?.reply ? [{from:"bot", text:data.reply}]
        : [{from:"bot", text:"(sin respuesta)"}];
      setMessages(m=>[...m, ...botMsgs]);
    }catch(e){
      // Fallback local si el backend no responde
      const localReply = engine.procesar(text);
      setMessages(m=>[...m, {from:"bot", text:localReply}]);
    }
  };

  const send = ()=>{ const t=input; setInput(""); return sendText(t); };

  // Menú inicial (sin escribir)
  const initialMenu = [
    { label:"🎓 Soy estudiante",       value:"2" },
    { label:"📚 Ver cursos (catálogo)", value:"1" },
    { label:"🧾 Iniciar matrícula",    value:"menu" },
    { label:"🏢 Info de la empresa",   value:"info empresa" },
  ];

  // Atajos luego de empezar (contexto básico)
  const quickAfter = [
    { label:"🔐 Autenticar",          value:"autenticar" },
    { label:"📧 Enviar correo",       value:"correo" },
    { label:"🗓 Agendar práctica",    value:"a" },
    { label:"ℹ️ Horarios",            value:"horarios" },
  ];

  return(
  <div className="min-h-screen w-full bg-emerald-50 flex items-center justify-center p-4">
    <div className="w-full max-w-[460px]">
      <div className="bg-emerald-100 rounded-[28px] shadow-xl overflow-hidden border border-emerald-200">
        <div className="bg-emerald-700 text-white px-4 py-3 flex justify-between items-center">
          <div className="flex items-center gap-3">
            <img src="/static/logoHARO.png" alt="HARO" className="w-9 h-9 rounded-full object-cover border border-white/30"/>
            <div><div className="font-semibold">Academia de Conducción HARO</div>
            <div className="text-xs text-white/80">Atención virtual (demo)</div></div>
          </div>
          <button onClick={()=>setShowDB(true)} className="px-3 py-1 bg-white/15 hover:bg-white/25 rounded-md">📄 Base</button>
        </div>

        <div ref={scroller} className="h-[58vh] overflow-y-auto smooth bg-[url('https://i.imgur.com/3ZQ3Q2O.png')] bg-cover p-3 space-y-2">
          {messages.map((m,i)=>m.from==="bot"?<BotBubble key={i} text={m.text}/>:<UserBubble key={i} text={m.text}/>)}
        </div>

        {/* Menú inicial: aparece antes de escribir */}
        {!started && (
          <QuickActions title="Menú rápido" items={initialMenu} onPick={sendText}/>
        )}

        {/* Atajos después de comenzar */}
        {started && (
          <QuickActions title="Atajos" items={quickAfter} onPick={sendText}/>
        )}

        {/* Asistentes de formato */}
        <FormatAssist onSend={sendText} />

        {/* Input manual */}
        <div className="bg-white px-3 py-2 flex gap-2 border-t">
          <input className="flex-1 rounded-full border border-emerald-200 px-4 py-2 focus:ring-2 focus:ring-emerald-400"
                 placeholder='Escribe aquí... o usa los botones'
                 value={input} onChange={e=>setInput(e.target.value)}
                 onKeyDown={e=>e.key==="Enter"&&send()}/>
          <button onClick={send} className="rounded-full bg-emerald-600 text-white px-4 py-2 font-medium hover:bg-emerald-700">Enviar</button>
        </div>
      </div>
    </div>
    <BaseMatriculasPanel open={showDB} onClose={()=>setShowDB(false)}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
