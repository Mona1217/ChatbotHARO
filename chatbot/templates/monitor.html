<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monitor WhatsApp Simulado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/monitor.css" />
</head>
<body data-token="{{ token }}" data-poll-seconds="{{ poll_seconds }}">
  <main class="dashboard">
    <section class="workspace">
      <aside class="contacts-panel">
        <div class="panel-title-row">
          <h2>Conversaciones</h2>
          <span id="contactsMeta" class="panel-meta">0 chats</span>
        </div>
        <div id="contactsList" class="contacts-list"></div>
        <div id="contactsEmpty" class="panel-empty hidden">No hay conversaciones para mostrar.</div>
      </aside>

      <section class="chat-panel">
        <div class="chat-header">
          <div>
            <h2 id="activeContact">Sin contacto seleccionado</h2>
            <p id="activeMeta" class="subtitle">Selecciona un chat para ver el historial.</p>
          </div>
        </div>
        <div id="chatTimeline" class="chat-timeline"></div>
        <div id="chatEmpty" class="panel-empty">Aun no hay mensajes en este chat.</div>
        <div id="errorState" class="error-banner hidden"></div>
      </section>
    </section>
  </main>

  <div class="metrics-ghost" aria-hidden="true">
    <span id="botStatus" class="chip chip-live">ACTIVO</span>
    <button id="togglePauseBtn" class="btn btn-danger" type="button">Pausar bot</button>
    <button id="refreshBtn" class="btn btn-soft" type="button">Refrescar</button>
    <span id="eventCount">0</span>
    <span id="contactCount">0</span>
    <span id="lastUpdate">-</span>
  </div>

  <script src="../static/monitor.js"></script>
</body>
</html>
