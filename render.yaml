services:
  - type: web
    name: whatsapp-flow-bot
    plan: starter
    region: oregon
    runtime: docker
    autoDeployTrigger: commit
    healthCheckPath: /health
    numInstances: 1
    maxShutdownDelaySeconds: 60
    dockerfilePath: ./Dockerfile
    dockerContext: .
    previews:
      generation: manual
    disk:
      name: monitor-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "10000"
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v24.0
      - key: MONITOR_DB_PATH
        value: /var/data/monitor_events.db
      - key: MONITOR_TOKEN
        generateValue: true
      - key: MONITOR_USERNAME
        sync: false
      - key: MONITOR_PASSWORD
        sync: false
      - key: APP_SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: MONITOR_LOG_MAX
        value: "0"
      - key: WEBHOOK_JOB_HISTORY_LIMIT
        value: "1000"
      - key: SESSION_TIMEOUT_MINUTES
        value: "10"
      - key: SPRING_BASE_URL
        value: https://harorepositoty2-590358146556.europe-west1.run.app/
      - key: SPRING_AUTH_URL
        value: https://harorepositoty2-590358146556.europe-west1.run.app/api/auth/login
      - key: SPRING_AUTH_BODY_JSON
        sync: false
      - key: SPRING_AUTH_TOKEN_JSON_PATH
        value: token
      - key: MONITOR_AUTH_USERNAME_FIELD
        value: email
      - key: MONITOR_AUTH_PASSWORD_FIELD
        value: password
      - key: MONITOR_AUTH_EXTRA_BODY_JSON
        sync: false
      - key: SPRING_AUTH_HEADER_NAME
        value: Authorization
      - key: SPRING_AUTH_HEADER_PREFIX
        value: "Bearer "
      - key: CHATBOT_ENROLLMENT_WELCOME_IMAGE_URL
        value: https://haro-files.s3.us-east-2.amazonaws.com/clases/clase-1/imagen/2026/03/saludo-bot.jpeg
      - key: CHATBOT_ENROLLMENT_WELCOME_IMAGE_CAPTION
        value: ""
      - key: USE_WELCOME_TEMPLATE
        value: "false"
      - key: BOT_PAUSED
        value: "false"
