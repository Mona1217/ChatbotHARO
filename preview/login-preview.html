<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview Login Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/base.css" />
  <link rel="stylesheet" href="../static/styles.css" />
  <link rel="stylesheet" href="../static/monitor.css" />
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-visual">
        <div class="login-visual-surface" aria-hidden="true">
          <div class="login-visual-overlay"></div>
          <div class="login-logo-hero-wrap">
            <img src="../static/img/LogoLetrasBlancas.png" alt="Logo HARO" class="login-logo-hero" />
          </div>
        </div>
      </div>

      <div class="login-content">
        <div class="login-brand">
          <div class="login-brand-copy">
            <p class="toolbar-eyebrow login-eyebrow">Monitor de Ha-Rot</p>
            <h2 class="login-form-title">Iniciar sesion</h2>
            <p class="login-copy">Entra con tus credenciales institucionales para continuar al panel de monitoreo.</p>
          </div>
        </div>

        <form class="login-form">
          <label class="login-label" for="username">Correo</label>
          <input id="username" name="username" type="text" class="login-input" value="admin@haro.com" />

          <label class="login-label" for="password">Contrasena</label>
          <input id="password" name="password" type="password" class="login-input" value="123456" />

          <button type="button" class="btn btn-primary login-submit">Entrar</button>
        </form>

        <p class="login-note">Esta pantalla es solo para pruebas visuales locales. No usa Flask ni autenticacion real.</p>
      </div>
    </section>
  </main>
</body>
</html>
